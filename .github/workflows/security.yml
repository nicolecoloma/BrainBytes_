name: BrainBytes Security Scan

on: 
  workflow_dispatch:

jobs: 
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps: 
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            brainbytes-multi-container/frontend/package-lock.json
            brainbytes-multi-container/backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm install --legacy-peer-deps

      - name: Audit frontend dependencies
        working-directory: ./brainbytes-multi-container/frontend
        run: npm audit --json || true

      - name: Install backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: |
          npm cache clean --force || true
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Audit backend dependencies
        working-directory: ./brainbytes-multi-container/backend
        run: npm audit --json || true

      - name: Run Snyk to check Frontend vulnerabilities
        if: env.SNYK_TOKEN != ''
        working-directory: ./brainbytes-multi-container/frontend
        run: npx snyk test --severity-threshold=high || echo "::warning::Snyk frontend scan skipped (token may be invalid)"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk to check Backend vulnerabilities
        if: env.SNYK_TOKEN != ''
        working-directory: ./brainbytes-multi-container/backend
        run: npx snyk test --severity-threshold=high || echo "::warning::Snyk backend scan skipped (token may be invalid)"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Create mock environment file for scanning
        run: |
          mkdir -p brainbytes-multi-container/backend
          touch brainbytes-multi-container/backend/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./brainbytes-multi-container/frontend
          push: false
          load: true
          tags: brainbytes-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build backend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./brainbytes-multi-container/backend
          push: false
          load: true
          tags: brainbytes-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Scan Frontend Docker Images 
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: 'brainbytes-frontend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Scan Backend Docker Images 
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: 'brainbytes-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
