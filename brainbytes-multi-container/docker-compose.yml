version: '3'
services:
  frontend:
    build: ./frontend
    ports:
      - "7000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
    command: sh -c "npm install --legacy-peer-deps && npm run dev"

  backend:
    build: ./backend
    ports:
      - "5000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

    env_file:
      - ./backend/.env

    dns:
      - 8.8.8.8
      - 1.1.1.1

    depends_on:
      - mongo

    restart: unless-stopped

  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
