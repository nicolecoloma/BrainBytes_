groups:
  - name: brainbytes_alerts
    rules:
      - alert: HighAIResponseLatency
        expr: histogram_quantile(0.95, rate(brainbytes_ai_response_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "AI response time is high"
          description: "95th percentile AI response duration has exceeded 5 seconds for 2 minutes."

      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend is down"
          description: "Prometheus cannot reach the backend service for 1 minute."

      - alert: HighErrorRate
        expr: sum(rate(brainbytes_http_requests_total{status=~"5.."}[5m])) / sum(rate(brainbytes_http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate"
          description: "More than 5% of requests are returning 5xx errors over the last 5 minutes."
