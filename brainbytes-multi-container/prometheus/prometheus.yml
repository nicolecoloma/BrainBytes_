global:
  scrape_interval: 15s

rule_files:
  - "recording_rules.yml"
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'backend'
    scrape_interval: 5s
    scrape_timeout: 4s
    sample_limit: 1000
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ['brainbytes-test-production.up.railway.app']
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.*):.*'
        target_label: instance_name
        replacement: '${1}'
      - source_labels: [job]
        target_label: service
        replacement: 'brainbytes-backend'
